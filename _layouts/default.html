<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="author" content="phmatray">
  <meta name="keywords" content="{{ page.keywords | default: 'yendor, roguelike, rogue, dungeon crawler, permadeath, pixel art, retro game, macos game, mac app store, rust game, procedural generation, turn-based rpg' }}">
  <link rel="icon" type="image/png" href="{{ '/logo-yendor.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/logo-yendor.png' | relative_url }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  {% seo %}

  <!-- Structured Data: SoftwareApplication -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "Yendor",
    "description": "{{ page.description | default: site.description | strip_html | escape }}",
    "url": "{{ site.url }}{{ site.baseurl }}/",
    "applicationCategory": "GameApplication",
    "applicationSubCategory": "Role Playing Game",
    "operatingSystem": "macOS 12+",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "author": {
      "@type": "Organization",
      "name": "Atypical Consulting",
      "url": "https://github.com/Atypical-Consulting"
    },
    "screenshot": "{{ site.url }}{{ site.baseurl }}/screenshots/02_dungeon_exploration.png",
    "image": "{{ site.url }}{{ site.baseurl }}/logo-yendor.png",
    "downloadUrl": "https://apps.apple.com/app/yendor/id6746498844",
    "softwareVersion": "1.0.1",
    "datePublished": "2026-02-23"
  }
  </script>

  {% if page.url == "/" or page.url == "/index.html" %}
  <!-- Structured Data: BreadcrumbList (Home) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}{{ site.baseurl }}/"
      }
    ]
  }
  </script>
  {% endif %}

  {% if page.url == "/privacy" or page.url == "/privacy/" %}
  <!-- Structured Data: BreadcrumbList (Privacy) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}{{ site.baseurl }}/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "Privacy Policy",
        "item": "{{ site.url }}{{ site.baseurl }}/privacy"
      }
    ]
  }
  </script>
  {% endif %}

  <style>
    :root {
      --bg: #0a0a0f;
      --bg-card: #12121a;
      --bg-card-hover: #1a1a26;
      --gold: #d4a843;
      --gold-dim: #a07c2e;
      --text: #e0ddd4;
      --text-muted: #8a8677;
      --accent: #c45a3c;
      --border: #2a2a35;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    a { color: var(--gold); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--accent); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      padding: 20px 0;
    }

    header .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo-link {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-link img {
      width: 40px;
      height: 40px;
      border-radius: 8px;
    }

    .logo-link span {
      font-size: 1.3rem;
      font-weight: bold;
      color: var(--gold);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    nav { display: flex; gap: 24px; }
    nav a { color: var(--text-muted); font-size: 0.95rem; }
    nav a:hover { color: var(--gold); }

    /* Main */
    main {
      padding: 48px 0 80px;
    }

    /* Footer */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--gold); }

    /* Typography */
    h1 { font-size: 2.5rem; color: var(--gold); margin-bottom: 16px; letter-spacing: 1px; }
    h2 { font-size: 1.6rem; color: var(--gold-dim); margin: 40px 0 16px; }
    h3 { font-size: 1.2rem; color: var(--text); margin: 24px 0 8px; }
    p { margin-bottom: 16px; }
    ul, ol { margin: 0 0 16px 24px; }
    li { margin-bottom: 6px; }

    /* Content page styling */
    .content h1 { border-bottom: 1px solid var(--border); padding-bottom: 16px; }
    .content p { max-width: 720px; }

    .last-updated {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-style: italic;
      margin-top: 48px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 48px 0 32px;
    }

    .hero img {
      width: 180px;
      height: 180px;
      border-radius: 24px;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(212, 168, 67, 0.15);
    }

    .hero h1 {
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .hero .tagline {
      font-size: 1.15rem;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      padding: 12px 28px;
      background: var(--gold);
      color: var(--bg);
      font-weight: bold;
      font-size: 1rem;
      border-radius: 8px;
      letter-spacing: 1px;
    }

    .badge:hover { background: var(--accent); color: #fff; }

    /* Features */
    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin: 32px 0;
    }

    .feature {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s, background 0.2s;
    }

    .feature:hover {
      border-color: var(--gold-dim);
      background: var(--bg-card-hover);
    }

    .feature h3 { margin-top: 0; color: var(--gold); font-size: 1.05rem; }
    .feature p { color: var(--text-muted); font-size: 0.93rem; margin-bottom: 0; }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 32px 0;
    }

    .gallery-item {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, transform 0.2s;
    }

    .gallery-item:hover {
      border-color: var(--gold-dim);
      transform: translateY(-2px);
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      color: var(--text-muted);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .gallery-item:hover .caption { opacity: 1; }

    /* Featured screenshot (full width) */
    .gallery-item.featured {
      grid-column: 1 / -1;
      aspect-ratio: 16 / 10;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: zoom-out;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 8px 48px rgba(0, 0, 0, 0.5);
    }

    .lightbox-close {
      position: absolute;
      top: 16px;
      right: 24px;
      color: var(--text-muted);
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      background: none;
      border: none;
    }

    .lightbox-close:hover { color: var(--gold); }

    /* Responsive */
    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; letter-spacing: 2px; }
      h1 { font-size: 1.8rem; }
      header .container { flex-direction: column; gap: 12px; }
      .gallery { grid-template-columns: 1fr; }
      .gallery-item.featured { aspect-ratio: 16 / 10; }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="logo-link" aria-label="Yendor Home">
        <img src="{{ '/logo-yendor.png' | relative_url }}" alt="Yendor game logo" width="40" height="40">
        <span>Yendor</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/privacy' | relative_url }}">Privacy</a>
        <a href="https://github.com/Atypical-Consulting/YendorSupport/issues" rel="noopener">Support</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      {{ content }}
    </div>
  </main>

  <!-- Lightbox overlay -->
  <div class="lightbox" id="lightbox" role="dialog" aria-label="Screenshot preview">
    <button class="lightbox-close" aria-label="Close preview">&times;</button>
    <img src="" alt="">
  </div>

  <script>
    (function() {
      var lightbox = document.getElementById('lightbox');
      if (!lightbox) return;
      var lbImg = lightbox.querySelector('img');
      var items = document.querySelectorAll('.gallery-item');

      items.forEach(function(item) {
        item.addEventListener('click', function() {
          var img = item.querySelector('img');
          lbImg.src = img.src;
          lbImg.alt = img.alt;
          lightbox.classList.add('active');
        });
      });

      lightbox.addEventListener('click', function() {
        lightbox.classList.remove('active');
      });

      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') lightbox.classList.remove('active');
      });
    })();
  </script>

  <footer>
    <div class="container">
      <p>&copy; 2024&ndash;2026 <a href="https://github.com/phmatray" rel="noopener">phmatray</a> &middot; Atypical Consulting</p>
      <p style="margin-top: 8px;">Based on Rogue 5.4.4 by Michael Toy, Ken Arnold &amp; Glenn Wichman</p>
    </div>
  </footer>
</body>
</html>
